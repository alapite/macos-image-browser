name: ImageBrowser
options:
  bundleIdPrefix: com.imagebrowser
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

packages:
  GRDB.swift:
    url: https://github.com/groue/GRDB.swift.git
    version: 7.10.0

targets:
  ImageBrowser:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ImageBrowser
        excludes:
          - Info.plist
          - "**/README.md"
    dependencies:
      - package: GRDB.swift
        product: GRDB
    settings:
      base:
        PRODUCT_NAME: ImageBrowser
        PRODUCT_BUNDLE_IDENTIFIER: com.imagebrowser.ImageBrowser
        INFOPLIST_FILE: Sources/ImageBrowser/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ""
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: YES
    preBuildScripts: []
    postBuildScripts: []
  ImageBrowserUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UITests
    dependencies:
      - target: ImageBrowser
  ImageBrowserTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/ImageBrowserTests
    resources:
      - path: Tests/Fixtures
    dependencies:
      - target: ImageBrowser

schemes:
  ImageBrowser:
    build:
      targets:
        ImageBrowser: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ImageBrowserTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  ImageBrowserUITests:
    build:
      targets:
        ImageBrowser: all
    test:
      config: Debug
      targets:
        - ImageBrowserUITests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
