name: ImageBrowser
options:
  bundleIdPrefix: com.imagebrowser
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  ImageBrowser:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ImageBrowserApp.swift
      - path: AppState.swift
      - path: ContentView.swift
    resources:
      - path: Info.plist
    settings:
      base:
        PRODUCT_NAME: ImageBrowser
        PRODUCT_BUNDLE_IDENTIFIER: com.imagebrowser.ImageBrowser
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: ""
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_EMIT_LOC_STRINGS: YES
    preBuildScripts: []
    postBuildScripts: []

schemes:
  ImageBrowser:
    build:
      targets:
        ImageBrowser: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
